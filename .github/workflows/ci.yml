name: Continuous Integration

on:
  push:
  release:
    types:
      - "published"

jobs:
  ci-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15-intel
            qt: "6.11.0"
            cgal: "6.1.1"
            variant: "current-intel"
          - os: macos-15
            qt: "6.11.0"
            cgal: "6.1.1"
            variant: "current-arm64"
    name: CI macOS ${{ matrix.variant }} (${{ matrix.os }}/Qt ${{ matrix.qt }}/CGAL ${{ matrix.cgal }})
    runs-on: ${{ matrix.os }}
    env:
      HOMEBREW_NO_ANALYTICS: 1
    steps:
      - uses: actions/checkout@v6
      - name: Install dependencies
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          brew analytics off
          brew install cmake create-dmg mpfr boost openssl@1.1
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}
      - name: Cache CGAL
        id: cache-cgal
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/include/CGAL
            /usr/local/lib/cmake/CGAL
            /usr/local/lib/libCGAL*
          key: cgal-macos-${{ matrix.os }}-${{ matrix.cgal }}
      - name: Install CGAL
        if: steps.cache-cgal.outputs.cache-hit != 'true'
        env:
          CGAL_VERSION: ${{ matrix.cgal }}
        run: |
          mkdir /tmp/cgal
          cd /tmp/cgal
          wget https://github.com/CGAL/cgal/releases/download/v$CGAL_VERSION/CGAL-$CGAL_VERSION.tar.xz
          tar xf CGAL-$CGAL_VERSION.tar.xz
          mkdir CGAL-$CGAL_VERSION/build
          cd CGAL-$CGAL_VERSION/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          sudo make install
      - name: Build on macOS
        env:
          OS: ${{ matrix.os }}
          QT_VERSION: ${{ matrix.qt }}
          VARIANT: ${{ matrix.variant }}
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR=/usr/local/opt/openssl@1.1
          make -j
          ./valeronoi-tests
          macdeployqt valeronoi.app
          mkdir dist
          mv valeronoi.app dist/Valeronoi.app
          create-dmg --hdiutil-verbose --no-internet-enable --skip-jenkins --volname "Valeronoi Installer" --volicon "../assets/icon/valeronoi.icns" --window-pos 200 120 --window-size 800 400 --icon-size 100 --icon "Valeronoi.app" 200 190 --hide-extension "Valeronoi.app" --app-drop-link 600 185 "Valeronoi-macOS-Intel-$VARIANT.dmg" "dist/"
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: valeronoi-macos-${{ matrix.variant }}
          path: build/Valeronoi-macOS-Intel-${{ matrix.variant }}.dmg
      - name: Upload release binary
        if: ${{ github.event_name == 'release' }}
        uses: alexellis/upload-assets@0.4.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          asset_paths: '["build/Valeronoi-macOS-Intel-${{ matrix.variant }}.dmg"]'
  ci-windows:
    name: CI Windows/MSVC
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.3"
          arch: "win64_msvc2022_64"
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Cache vcpkg
        uses: actions/cache@v5
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\vcpkg.exe
            C:\vcpkg\scripts\buildsystems\vcpkg.cmake
          key: vcpkg-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-
      - name: Install vcpkg dependencies
        run: |
          vcpkg install cgal[core] gmp mpfr boost-system boost-thread boost-program-options openssl --triplet x64-windows
      - name: Build on Windows
        run: |
          mkdir build
          cd build
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DCMAKE_BUILD_TYPE=Release
          cmake --build . --config Release -j 4
          .\Release\valeronoi-tests.exe
          mkdir dist
          copy Release\valeronoi.exe dist\valeronoi.exe
          copy ..\COPYING dist
          copy ..\assets\appinfo.rc dist
          mkdir dist\icon
          copy ..\assets\icon\appicon.ico dist\icon
          & "${env:QT_ROOT_DIR}\bin\windeployqt.exe" --release --no-translations --compiler-runtime dist\valeronoi.exe
          powershell -Command "if (Test-Path Release\*.dll) { Copy-Item Release\*.dll -Destination dist }"
          powershell -Command "Compress-Archive -Path dist\* -DestinationPath Valeronoi-Windows-portable-x86_64.zip"
      - name: Upload portable archive
        uses: actions/upload-artifact@v7
        with:
          name: valeronoi-windows-portable
          path: build/dist
      - name: Upload release portable archive
        if: ${{ github.event_name == 'release' }}
        uses: alexellis/upload-assets@0.4.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          asset_paths: '["build/Valeronoi-Windows-portable-x86_64.zip"]'
      - name: Build installer
        run: |
          cd build/dist
          copy ..\..\tools\windows\install.nsi .
          makensis install.nsi
      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: valeronoi-windows-installer
          path: build/dist/Valeronoi-installer-x86_64.exe
      - name: Upload release portable archive
        if: ${{ github.event_name == 'release' }}
        uses: alexellis/upload-assets@0.4.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          asset_paths: '["build/dist/Valeronoi-installer-x86_64.exe"]'
  ci-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            qt: "6.11.0"
            cgal: "6.1.1"
            variant: "current"
    name: CI Linux/AppImage ${{ matrix.variant }} (${{ matrix.os }}/Qt ${{ matrix.qt }}/CGAL ${{ matrix.cgal }})
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ matrix.qt }}
      - name: Install dependencies
        run: |
          sudo apt-get install libfuse2 openssl libxcb-xkb-dev libxcb-cursor-dev libxkbcommon-x11-0 cmake xz-utils libmpfr-dev libboost-dev -y
      - name: Cache CGAL
        id: cache-cgal
        uses: actions/cache@v5
        with:
          path: |
            /usr/local/include/CGAL
            /usr/local/lib/cmake/CGAL
            /usr/local/lib/libCGAL*
          key: cgal-linux-${{ matrix.os }}-${{ matrix.cgal }}
      - name: Install CGAL
        if: steps.cache-cgal.outputs.cache-hit != 'true'
        env:
          CGAL_VERSION: ${{ matrix.cgal }}
        run: |
          mkdir -p /tmp/cgal
          cd /tmp/cgal
          wget https://github.com/CGAL/cgal/releases/download/v$CGAL_VERSION/CGAL-$CGAL_VERSION.tar.xz
          tar xf CGAL-$CGAL_VERSION.tar.xz
          mkdir CGAL-$CGAL_VERSION/build
          cd CGAL-$CGAL_VERSION/build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          sudo make install
      - name: Build on Linux
        env:
          OS: ${{ matrix.os }}
          QT_VERSION: ${{ matrix.qt }}
          VARIANT: ${{ matrix.variant }}
        run: |
          mkdir build
          cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DCMAKE_BUILD_TYPE=Release
          make -j install DESTDIR=AppDir
          ./valeronoi-tests
          mkdir tools
          cd tools
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x *
          cd ..
          export PATH=$Qt6_DIR/bin:$PATH
          tools/linuxdeploy-x86_64.AppImage --appdir AppDir -i ../assets/icon/icon-256.png -d AppDir/usr/share/applications/valeronoi.desktop --output appimage --plugin qt
          mv Valeronoi-*.AppImage "Valeronoi-${VARIANT}-x86_64.AppImage"
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: valeronoi-linux-appimage-${{ matrix.variant }}
          path: build/Valeronoi-${{ matrix.variant }}-x86_64.AppImage
      - name: Upload release AppImage
        if: ${{ github.event_name == 'release' }}
        uses: alexellis/upload-assets@0.4.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          asset_paths: '["build/Valeronoi-${{ matrix.variant }}-x86_64.AppImage"]'
